apiVersion: apps/v1
kind: Deployment
metadata:
  name: board-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: board-service
  template:
    metadata:
      labels:
        app: board-service
    spec:
      containers:
        - name: board-service
          image: board-service:latest
          ports:
            - containerPort: 8081
