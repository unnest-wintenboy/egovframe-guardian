name: eGovFrame Guardian Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi
      - name: Validate release package
        run: |
          python -m json.tool .codex-plugin/plugin.json >/tmp/plugin.json
          python -m json.tool .claude-plugin/plugin.json >/tmp/claude-plugin.json
          python -m json.tool .agents/plugins/marketplace.json >/tmp/codex-marketplace.json
          python -m json.tool .claude-plugin/marketplace.json >/tmp/claude-marketplace.json
          python -m json.tool hooks/hooks.json >/tmp/hooks.json
          python -m json.tool config/egovframe-guardian.json >/tmp/policy.json
          python -m py_compile scripts/egovframe_distribution.py scripts/egovframe_distribution_core.py scripts/egovframe_guard.py scripts/egovframe_guard_context.py scripts/egovframe_guard_core.py scripts/egovframe_guard_hooks.py scripts/egovframe_guard_state.py scripts/score_maturity.py scripts/validate_release_package.py
          uv run --with basedpyright basedpyright scripts tests
          python skills/egovframe-developer/scripts/audit_coverage.py --skill-dir skills/egovframe-developer
          uv run --with pytest pytest
          uv run --with pytest --with pytest-cov pytest --cov=egovframe_guard_core --cov=egovframe_guard_hooks --cov=egovframe_guard_state --cov-report=term-missing --cov-fail-under=80
          python scripts/validate_release_package.py .
          python scripts/score_maturity.py . --fail-under 130
      - name: Build plugin archives
        run: |
          VERSION="${RELEASE_TAG#v}"
          PACKAGE="egovframe-guardian-${VERSION}"
          mkdir -p dist "$RUNNER_TEMP/$PACKAGE"
          rsync -a \
            --exclude ".git/" \
            --exclude ".venv/" \
            --exclude ".pytest_cache/" \
            --exclude ".ruff_cache/" \
            --exclude ".basedpyright/" \
            --exclude "dist/" \
            ./ "$RUNNER_TEMP/$PACKAGE/"
          (cd "$RUNNER_TEMP" && zip -qr "$GITHUB_WORKSPACE/dist/${PACKAGE}.zip" "$PACKAGE")
          tar -C "$RUNNER_TEMP" -czf "dist/${PACKAGE}.tar.gz" "$PACKAGE"
          sha256sum "dist/${PACKAGE}.zip" "dist/${PACKAGE}.tar.gz" > dist/SHA256SUMS.txt
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" \
            dist/*.zip \
            dist/*.tar.gz \
            dist/SHA256SUMS.txt \
            --target "$GITHUB_SHA" \
            --title "eGovFrame Guardian ${RELEASE_TAG}" \
            --notes "Dual Codex and Claude Code plugin release with public marketplace catalogs, eGovFrame development skill bundle, local guardrail hooks, scanner tests, and packaged release archives."
